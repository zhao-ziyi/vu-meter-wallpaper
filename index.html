<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VU Meter Wallpaper</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
        width: 100%; height: 100%;
        overflow: hidden;
        background: #020812;
        font-family: 'Rajdhani', 'Segoe UI', sans-serif;
    }
    canvas {
        display: block;
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
    }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<script>
(() => {
    // ═══════════════════════════════════════════════════════════
    //  CONFIG
    // ═══════════════════════════════════════════════════════════
    const DB_MIN = -20;
    const DB_MAX = 3;
    const START_ANGLE = Math.PI * 0.75;   // 135° (7:30)
    const END_ANGLE   = Math.PI * 2.25;   // 405°≡45° (4:30)

    const NEEDLE_ATTACK  = 0.35;
    const NEEDLE_RELEASE = 0.10;
    const PEAK_ATTACK    = 0.25;
    const PEAK_RELEASE   = 0.04;
    const PEAK_HOLD_TIME = 1200;
    const PEAK_DECAY_SPEED = 0.03;
    const TRAIL_LENGTH = 8;

    // ═══════════════════════════════════════════════════════════
    //  CANVAS SETUP
    // ═══════════════════════════════════════════════════════════
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;

    // One-time canvas size init (Wallpaper Engine resolution is fixed after startup)
    {
        const dpr = window.devicePixelRatio || 1;
        W = canvas.width  = window.innerWidth  * dpr;
        H = canvas.height = window.innerHeight * dpr;
        canvas.style.width  = window.innerWidth + 'px';
        canvas.style.height = window.innerHeight + 'px';
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    // ═══════════════════════════════════════════════════════════
    //  AUDIO STATE  (unchanged)
    // ═══════════════════════════════════════════════════════════
    let leftLevel = DB_MIN, rightLevel = DB_MIN;
    let leftNeedle = DB_MIN, rightNeedle = DB_MIN;
    let leftPeak = DB_MIN, rightPeak = DB_MIN;
    let leftPeakTime = 0, rightPeakTime = 0;
    let leftHudNeedle = DB_MIN, rightHudNeedle = DB_MIN;
    let leftHudPeak = DB_MIN, rightHudPeak = DB_MIN;
    let lastAudioUpdate = 0;
    let audioTimeout = null;
    let audioSpectrum = new Array(128).fill(0);

    function onAudioData(audioArray) {
        if (!audioArray || audioArray.length < 128) return;
        const now = performance.now();
        lastAudioUpdate = now;
        let lSum = 0;
        for (let i = 0; i < 64; i++) { const v = Math.min(audioArray[i], 1); lSum += v; audioSpectrum[i] = v; }
        let lAvg = lSum / 64;
        let rSum = 0;
        for (let i = 64; i < 128; i++) { const v = Math.min(audioArray[i], 1); rSum += v; audioSpectrum[i] = v; }
        let rAvg = rSum / 64;
        leftLevel  = -20 + Math.pow(lAvg, 0.15) * 23;
        rightLevel = -20 + Math.pow(rAvg, 0.15) * 23;
        if (leftLevel > leftPeak)  { leftPeak = leftLevel;  leftPeakTime = now; }
        if (rightLevel > rightPeak) { rightPeak = rightLevel; rightPeakTime = now; }
        clearTimeout(audioTimeout);
        audioTimeout = setTimeout(() => { leftLevel = DB_MIN; rightLevel = DB_MIN; }, 200);
    }

    if (typeof window.wallpaperRegisterAudioListener === 'function') {
        window.wallpaperRegisterAudioListener(onAudioData);
    } else {
        startTestMode();
    }

    function startTestMode() {
        let t = 0;
        setInterval(() => {
            t += 0.03;
            const l = 0.4 + 0.35 * Math.sin(t * 1.1) + 0.15 * Math.sin(t * 2.7);
            const r = 0.35 + 0.3 * Math.sin(t * 0.9 + 0.5) + 0.2 * Math.sin(t * 2.3 + 1.0);
            const lDb = -20 + l * 23;
            const rDb = -20 + r * 23;
            leftLevel  = clamp(lDb, DB_MIN, DB_MAX);
            rightLevel = clamp(rDb, DB_MIN, DB_MAX);
            if (leftLevel > leftPeak)  { leftPeak = leftLevel;  leftPeakTime = performance.now(); }
            if (rightLevel > rightPeak) { rightPeak = rightLevel; rightPeakTime = performance.now(); }

            // Generate fake spectrum for test mode
            for (let i = 0; i < 64; i++) {
                audioSpectrum[i]     = Math.max(0, l + 0.15 * Math.sin(t * 2.1 + i * 0.3));
                audioSpectrum[i + 64] = Math.max(0, r + 0.15 * Math.sin(t * 1.7 + i * 0.3));
            }
        }, 30);

    }

    // ═══════════════════════════════════════════════════════════
    //  PHYSICS HELPERS
    // ═══════════════════════════════════════════════════════════
    function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
    function dbToAngle(db) { return START_ANGLE + ((db - DB_MIN) / (DB_MAX - DB_MIN)) * (END_ANGLE - START_ANGLE); }

    function updateNeedle(current, target, attack, release) {
        return target > current
            ? current + (target - current) * attack
            : current + (target - current) * release;
    }

    // ═══════════════════════════════════════════════════════════
    //  VISUAL STATE
    // ═══════════════════════════════════════════════════════════
    let globalTime = 0;
    let trailFrame = 0;
    let leftTrail = [];
    let rightTrail = [];

    // ═══════════════════════════════════════════════════════════
    //  MULTI-LAYER PARTICLE SYSTEM
    // ═══════════════════════════════════════════════════════════
    const bgDust = [];
    const streamers = [];
    const energyOrbs = [];

    function initParticles() {
        const lw = window.innerWidth, lh = window.innerHeight;
        // Ambient dust
        for (let i = 0; i < 80; i++) {
            bgDust.push({
                x: Math.random() * lw, y: Math.random() * lh,
                vx: (Math.random() - 0.5) * 0.15, vy: (Math.random() - 0.5) * 0.12,
                r: Math.random() * 1.3 + 0.3,
                alpha: Math.random() * 0.3 + 0.04,
                phase: Math.random() * Math.PI * 2,
                freq: Math.random() * 0.003 + 0.001,
            });
        }
        // Rising streamers
        for (let i = 0; i < 28; i++) {
            streamers.push({
                x: Math.random() * lw, y: Math.random() * lh,
                vy: -(Math.random() * 0.35 + 0.08),
                vx: (Math.random() - 0.5) * 0.08,
                r: Math.random() * 0.9 + 0.2,
                alpha: Math.random() * 0.35 + 0.08,
                len: Math.random() * 10 + 4,
            });
        }
        // Energy orbs (orbit near meters)
        for (let i = 0; i < 16; i++) {
            energyOrbs.push({
                orbitAngle: Math.random() * Math.PI * 2,
                orbitSpeed: (Math.random() - 0.5) * 0.015,
                orbitR: 0,
                r: Math.random() * 1.8 + 0.6,
                alpha: Math.random() * 0.5 + 0.15,
                hue: Math.random() > 0.5 ? 190 : 260,
            });
        }
    }
    initParticles();

    function updateParticles(lw, lh) {
        for (const p of bgDust) {
            p.x += p.vx; p.y += p.vy;
            p.alpha = 0.04 + 0.28 * (0.5 + 0.5 * Math.sin(globalTime * p.freq + p.phase));
            if (p.x < -10) p.x = lw + 10; if (p.x > lw + 10) p.x = -10;
            if (p.y < -10) p.y = lh + 10; if (p.y > lh + 10) p.y = -10;
        }
        for (const s of streamers) {
            s.x += s.vx; s.y += s.vy;
            s.alpha = 0.08 + 0.3 * (0.5 + 0.5 * Math.sin(globalTime * 0.004 + s.x * 0.01));
            if (s.y < -20) { s.y = lh + 10; s.x = Math.random() * lw; }
            if (s.x < -10) s.x = lw + 10; if (s.x > lw + 10) s.x = -10;
        }
    }

    function updateEnergyOrbs(lcx, lcy, rcx, rcy, r) {
        const centers = [{ cx: lcx, cy: lcy }, { cx: rcx, cy: rcy }];
        for (let i = 0; i < energyOrbs.length; i++) {
            const orb = energyOrbs[i];
            const meter = centers[i % 2];
            orb.orbitR = r * (1.0 + 0.15 * Math.sin(globalTime * 0.002 + i));
            orb.orbitAngle += orb.orbitSpeed;
            orb.alpha = 0.15 + 0.4 * (0.5 + 0.5 * Math.sin(globalTime * 0.005 + i * 0.7));
            orb.x = meter.cx + Math.cos(orb.orbitAngle) * orb.orbitR;
            orb.y = meter.cy + Math.sin(orb.orbitAngle) * orb.orbitR;
        }
    }

    function drawBgDust() {
        for (const p of bgDust) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(0, 200, 240, ${p.alpha})`;
            ctx.fill();
        }
    }

    function drawStreamers() {
        for (const s of streamers) {
            const grad = ctx.createLinearGradient(s.x, s.y, s.x, s.y + s.len);
            grad.addColorStop(0, `rgba(0, 210, 255, ${s.alpha * 0.8})`);
            grad.addColorStop(1, `rgba(0, 210, 255, 0)`);
            ctx.beginPath();
            ctx.moveTo(s.x, s.y);
            ctx.lineTo(s.x, s.y + s.len);
            ctx.strokeStyle = grad;
            ctx.lineWidth = s.r;
            ctx.lineCap = 'round';
            ctx.stroke();
        }
    }

    function drawEnergyOrbs() {
        for (const orb of energyOrbs) {
            const rgb = orb.hue < 200 ? '0, 210, 255' : '130, 100, 255';
            // Outer glow
            ctx.beginPath();
            ctx.arc(orb.x, orb.y, orb.r * 3, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${rgb}, ${orb.alpha * 0.15})`;
            ctx.fill();
            // Core
            ctx.beginPath();
            ctx.arc(orb.x, orb.y, orb.r, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(${rgb}, ${orb.alpha})`;
            ctx.shadowColor = `rgba(${rgb}, 0.6)`;
            ctx.shadowBlur = 10;
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    // ═══════════════════════════════════════════════════════════
    //  BACKGROUND: dot grid + scanlines + radial glow
    // ═══════════════════════════════════════════════════════════
    function drawBackground(lw, lh, lcx, lcy, rcx, rcy, r) {
        const cx = lw / 2, cy = lh / 2;

        // Base gradient
        const bgGrad = ctx.createRadialGradient(cx, cy * 0.7, 0, cx, cy, Math.max(lw, lh) * 0.75);
        bgGrad.addColorStop(0, '#08101c');
        bgGrad.addColorStop(0.45, '#050d18');
        bgGrad.addColorStop(1, '#020610');
        ctx.fillStyle = bgGrad;
        ctx.fillRect(0, 0, lw, lh);

        // Dot grid
        const gridSpacing = 44;
        const dotR = 0.7;
        const baseFlicker = globalTime * 0.0008;
        for (let x = gridSpacing; x < lw; x += gridSpacing) {
            for (let y = gridSpacing; y < lh; y += gridSpacing) {
                const flicker = 0.4 + 0.6 * Math.sin(baseFlicker + x * 0.004 + y * 0.003);
                const alpha = 0.025 + flicker * 0.03;
                ctx.beginPath();
                ctx.arc(x, y, dotR, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 170, 210, ${alpha})`;
                ctx.fill();
            }
        }

        // Radial glow behind each meter
        const meters = [{ cx: lcx, cy: lcy }, { cx: rcx, cy: rcy }];
        for (const m of meters) {
            const glowGrad = ctx.createRadialGradient(m.cx, m.cy, r * 0.5, m.cx, m.cy, r * 1.6);
            glowGrad.addColorStop(0, 'rgba(0, 180, 220, 0.06)');
            glowGrad.addColorStop(0.5, 'rgba(0, 100, 180, 0.03)');
            glowGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = glowGrad;
            ctx.fillRect(0, 0, lw, lh);
        }

        // Scanlines
        const scanOff = (globalTime * 0.025) % 4;
        ctx.strokeStyle = 'rgba(0, 0, 0, 0.07)';
        ctx.lineWidth = 1;
        for (let y = scanOff; y < lh; y += 4) {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(lw, y); ctx.stroke();
        }

        // Vignette
        const vigGrad = ctx.createRadialGradient(cx, cy, Math.min(lw, lh) * 0.25, cx, cy, Math.max(lw, lh) * 0.85);
        vigGrad.addColorStop(0, 'rgba(0,0,0,0)');
        vigGrad.addColorStop(1, 'rgba(0,0,0,0.55)');
        ctx.fillStyle = vigGrad;
        ctx.fillRect(0, 0, lw, lh);
    }

    // ═══════════════════════════════════════════════════════════
    //  METER DRAWING
    // ═══════════════════════════════════════════════════════════
    function drawMeter(cx, cy, radius, needleDb, peakDb, label, trail, time) {
        const arcWidth = radius * 0.22;
        const isOver = needleDb >= 1;
        const zeroAngle = dbToAngle(0);

        // ── Dark track arc ──
        ctx.beginPath();
        ctx.arc(cx, cy, radius, START_ANGLE, END_ANGLE);
        ctx.lineWidth = arcWidth;
        ctx.strokeStyle = '#0a1018';
        ctx.shadowColor = 'rgba(0,0,0,0.9)';
        ctx.shadowBlur = 18;
        ctx.stroke();
        ctx.shadowBlur = 0;

        // ── Zone arcs (two independent arcs, butt cap for clean join at 0dB) ──
        ctx.lineCap = 'butt';

        // Blue zone: -20 to 0
        ctx.beginPath();
        ctx.arc(cx, cy, radius, START_ANGLE, zeroAngle);
        ctx.lineWidth = arcWidth * 0.55;
        ctx.strokeStyle = 'rgba(0, 210, 255, 0.10)';
        ctx.stroke();

        // Orange-to-red gradient zone: 0 to +3
        const gx0 = cx + Math.cos(zeroAngle) * radius;
        const gy0 = cy + Math.sin(zeroAngle) * radius;
        const gx1 = cx + Math.cos(END_ANGLE) * radius;
        const gy1 = cy + Math.sin(END_ANGLE) * radius;
        const grad = ctx.createLinearGradient(gx0, gy0, gx1, gy1);
        grad.addColorStop(0, 'rgba(255, 140, 0, 0.08)');
        grad.addColorStop(1, 'rgba(255, 50, 50, 0.10)');
        ctx.beginPath();
        ctx.arc(cx, cy, radius, zeroAngle, END_ANGLE);
        ctx.lineWidth = arcWidth * 0.55;
        ctx.strokeStyle = grad;
        ctx.stroke();

        // Rounded endpoints (manual dots at -20dB and +3dB)
        const dotR = arcWidth * 0.275;
        // -20dB: blue dot
        ctx.beginPath();
        ctx.arc(cx + Math.cos(START_ANGLE) * radius, cy + Math.sin(START_ANGLE) * radius, dotR, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0, 210, 255, 0.10)';
        ctx.fill();
        // +3dB: red dot
        ctx.beginPath();
        ctx.arc(cx + Math.cos(END_ANGLE) * radius, cy + Math.sin(END_ANGLE) * radius, dotR, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 50, 50, 0.10)';
        ctx.fill();

        // ── Tick marks ──
        const majorDbs = [-20, -10, -5, -3, -2, -1, 0, 1, 2, 3];
        const minorDbs = [-18, -16, -14, -12, -9, -8, -7, -6, -4, -2.5, -1.5, -0.5, 0.5, 1.5, 2.5];
        const needleAngle = dbToAngle(needleDb);
        const pulse = 0.7 + 0.3 * Math.sin(time * 0.004);

        for (const db of majorDbs) {
            const angle = dbToAngle(db);
            const isRed = db >= 1;
            const innerT = radius - arcWidth * 0.42;
            const outerT = radius + arcWidth * 0.38;
            // Brightness boost when needle is near this tick
            const distToNeedle = Math.abs(angle - needleAngle);
            const nearBoost = Math.max(0, 1 - distToNeedle / 0.2);

            ctx.beginPath();
            ctx.moveTo(cx + Math.cos(angle) * innerT, cy + Math.sin(angle) * innerT);
            ctx.lineTo(cx + Math.cos(angle) * outerT, cy + Math.sin(angle) * outerT);
            const baseAlpha = isRed ? 0.9 : 0.85;
            const tickAlpha = Math.min(1, baseAlpha + nearBoost * 0.3);
            ctx.strokeStyle = isRed
                ? `rgba(255, 70, 70, ${tickAlpha})`
                : `rgba(120, 235, 255, ${tickAlpha})`;
            ctx.lineWidth = db === 0 ? 2.8 : 1.8;
            ctx.shadowColor = isRed
                ? `rgba(255, 50, 50, ${0.3 + nearBoost * 0.5})`
                : `rgba(0, 200, 255, ${0.2 + nearBoost * 0.4})`;
            ctx.shadowBlur = isRed ? 6 : 5;
            ctx.stroke();
            ctx.shadowBlur = 0;

            // Label
            const labelR = radius + arcWidth * 0.82;
            const lx = cx + Math.cos(angle) * labelR;
            const ly = cy + Math.sin(angle) * labelR;
            ctx.font = `bold ${Math.round(radius * 0.13)}px 'Share Tech Mono', 'Consolas', monospace`;
            ctx.fillStyle = isRed
                ? `rgba(255, 110, 110, ${0.8 + nearBoost * 0.2})`
                : `rgba(140, 230, 255, ${0.8 + nearBoost * 0.2})`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = isRed
                ? `rgba(255, 60, 60, ${0.3 + nearBoost * 0.4})`
                : `rgba(0, 200, 255, ${0.2 + nearBoost * 0.3})`;
            ctx.shadowBlur = 3;
            ctx.fillText(db >= 0 ? `+${db}` : `${db}`, lx, ly);
            ctx.shadowBlur = 0;
        }

        for (const db of minorDbs) {
            if (db <= DB_MIN || db >= DB_MAX) continue;
            const angle = dbToAngle(db);
            const innerT = radius - arcWidth * 0.30;
            const outerT = radius + arcWidth * 0.25;
            const isRed = db >= 1;
            ctx.beginPath();
            ctx.moveTo(cx + Math.cos(angle) * innerT, cy + Math.sin(angle) * innerT);
            ctx.lineTo(cx + Math.cos(angle) * outerT, cy + Math.sin(angle) * outerT);
            ctx.strokeStyle = isRed
                ? 'rgba(255, 80, 80, 0.45)'
                : 'rgba(100, 210, 240, 0.4)';
            ctx.lineWidth = 0.9;
            ctx.stroke();
        }

        // ── Needle Trail ──
        const needleLen = radius + arcWidth * 0.15;
        if (trail && trail.length > 1) {
            for (let i = 0; i < trail.length - 1; i++) {
                const tAngle = dbToAngle(trail[i]);
                const alpha = ((i + 1) / trail.length) * 0.35;
                const tnx = cx + Math.cos(tAngle) * needleLen;
                const tny = cy + Math.sin(tAngle) * needleLen;
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                ctx.lineTo(tnx, tny);
                ctx.strokeStyle = `rgba(0, 210, 255, ${alpha})`;
                ctx.lineWidth = radius * 0.022;
                ctx.lineCap = 'round';
                ctx.shadowColor = `rgba(0, 200, 255, ${alpha * 0.5})`;
                ctx.shadowBlur = 8;
                ctx.stroke();
                ctx.shadowBlur = 0;
            }
        }

        // ── Center pivot (three-layer concentric rings) ──
        const baseR  = radius * 0.15;
        const baseW  = radius * 0.20;

        // Layer 1: outer glow ring (widest, faintest)
        ctx.beginPath();
        ctx.arc(cx, cy, baseR, 0, Math.PI * 2);
        ctx.lineWidth = baseW * 1.8;
        ctx.strokeStyle = isOver
            ? 'rgba(255, 70, 70, 0.08)'
            : 'rgba(0, 200, 255, 0.08)';
        ctx.shadowColor = isOver
            ? 'rgba(255, 50, 50, 0.15)'
            : 'rgba(0, 180, 255, 0.15)';
        ctx.shadowBlur = 18;
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Layer 2: main ring (mid-size, bright)
        ctx.beginPath();
        ctx.arc(cx, cy, baseR * 0.72, 0, Math.PI * 2);
        ctx.lineWidth = baseW * 0.70;
        ctx.strokeStyle = isOver
            ? 'rgba(255, 90, 90, 0.85)'
            : 'rgba(0, 210, 255, 0.85)';
        ctx.shadowColor = isOver
            ? 'rgba(255, 60, 60, 0.7)'
            : 'rgba(0, 200, 255, 0.7)';
        ctx.shadowBlur = isOver ? 14 : 12;
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Layer 3: inner ring (smallest, subtle)
        ctx.beginPath();
        ctx.arc(cx, cy, baseR * 0.44, 0, Math.PI * 2);
        ctx.lineWidth = baseW * 0.35;
        ctx.strokeStyle = isOver
            ? 'rgba(255, 130, 130, 0.35)'
            : 'rgba(100, 220, 255, 0.35)';
        ctx.stroke();

        // Center dot (tiny, bright)
        ctx.beginPath();
        ctx.arc(cx, cy, baseR * 0.18, 0, Math.PI * 2);
        ctx.fillStyle = isOver
            ? 'rgba(255, 160, 160, 0.9)'
            : 'rgba(180, 240, 255, 0.9)';
        ctx.shadowColor = isOver
            ? 'rgba(255, 100, 100, 0.8)'
            : 'rgba(100, 210, 255, 0.8)';
        ctx.shadowBlur = 8;
        ctx.fill();
        ctx.shadowBlur = 0;



        // ── Channel label ──
        ctx.font = `bold ${Math.round(radius * 0.18)}px 'Orbitron', 'Segoe UI', sans-serif`;
        ctx.fillStyle = 'rgba(100, 200, 255, 0.75)';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = 'rgba(60, 160, 255, 0.4)';
        ctx.shadowBlur = 6;
        ctx.fillText(label, cx, cy + radius * 0.55);
        ctx.shadowBlur = 0;

        // ── Outer bezel arcs with needle-following highlight ──
        const bezelOR = radius + arcWidth * 0.55;
        const bezelIR = radius - arcWidth * 0.55;
        const highlightSpan = 0.5; // radians of highlight spread
        const steps = 60;

        // Outer bezel: gradient arc that highlights at needle position
        for (let i = 0; i < steps; i++) {
            const a0 = START_ANGLE - 0.06 + (i / steps) * (END_ANGLE - START_ANGLE + 0.12);
            const a1 = START_ANGLE - 0.06 + ((i + 1) / steps) * (END_ANGLE - START_ANGLE + 0.12);
            const aMid = (a0 + a1) / 2;
            // Distance from needle angle (wrapped)
            let diff = Math.abs(aMid - needleAngle);
            if (diff > Math.PI) diff = Math.PI * 2 - diff;
            const t = Math.max(0, 1 - diff / highlightSpan);
            const ease = t * t * (3 - 2 * t); // smoothstep
            const alpha = 0.08 + ease * 0.55;
            const glow  = ease * 12;
            ctx.beginPath();
            ctx.arc(cx, cy, bezelOR, a0, a1);
            ctx.strokeStyle = isOver
                ? `rgba(255, 90, 90, ${alpha})`
                : `rgba(0, 210, 255, ${alpha})`;
            ctx.lineWidth = 2 + ease * 2.5; // bulge effect: thicker at needle
            ctx.shadowColor = isOver
                ? `rgba(255, 60, 60, ${ease * 0.6})`
                : `rgba(0, 200, 255, ${ease * 0.6})`;
            ctx.shadowBlur = glow;
            ctx.stroke();
            ctx.shadowBlur = 0;
        }

        // Inner bezel: static subtle arc (no highlight)
        ctx.beginPath();
        ctx.arc(cx, cy, radius - arcWidth * 0.55, START_ANGLE - 0.06, END_ANGLE + 0.06);
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = 'rgba(40, 120, 160, 0.18)';
        ctx.stroke();

        // Bright needle-position marker on outer bezel (sharp highlight)
        ctx.beginPath();
        ctx.arc(cx, cy, bezelOR, needleAngle - 0.04, needleAngle + 0.04);
        ctx.strokeStyle = isOver
            ? 'rgba(255, 160, 160, 0.85)'
            : 'rgba(180, 240, 255, 0.85)';
        ctx.lineWidth = 3.5;
        ctx.shadowColor = isOver
            ? 'rgba(255, 100, 100, 0.7)'
            : 'rgba(0, 210, 255, 0.7)';
        ctx.shadowBlur = 10;
        ctx.stroke();
        ctx.shadowBlur = 0;

        // ── Peak highlight on outer bezel ──
        if (peakDb > DB_MIN + 1) {
            const peakAngle = dbToAngle(peakDb);
            // Outer glow (wide, faint)
            ctx.beginPath();
            ctx.arc(cx, cy, bezelOR, peakAngle - 0.08, peakAngle + 0.08);
            ctx.strokeStyle = 'rgba(255, 60, 60, 0.25)';
            ctx.lineWidth = 10;
            ctx.shadowColor = 'rgba(255, 80, 80, 0.6)';
            ctx.shadowBlur = 25;
            ctx.stroke();
            ctx.shadowBlur = 0;
            // Main bright arc
            ctx.beginPath();
            ctx.arc(cx, cy, bezelOR, peakAngle - 0.06, peakAngle + 0.06);
            ctx.strokeStyle = 'rgba(255, 80, 80, 0.95)';
            ctx.lineWidth = 5;
            ctx.shadowColor = 'rgba(255, 120, 120, 0.9)';
            ctx.shadowBlur = 20;
            ctx.stroke();
            ctx.shadowBlur = 0;
            // Inner bright core
            ctx.beginPath();
            ctx.arc(cx, cy, bezelOR, peakAngle - 0.03, peakAngle + 0.03);
            ctx.strokeStyle = 'rgba(255, 180, 180, 0.7)';
            ctx.lineWidth = 2;
            ctx.shadowColor = 'rgba(255, 200, 200, 0.8)';
            ctx.shadowBlur = 12;
            ctx.stroke();
            ctx.shadowBlur = 0;
        }
        // ── Needle ──
        const nx = cx + Math.cos(needleAngle) * needleLen;
        const ny = cy + Math.sin(needleAngle) * needleLen;

        // Wide glow
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(nx, ny);
        ctx.strokeStyle = isOver ? 'rgba(255, 60, 60, 0.12)' : 'rgba(0, 200, 255, 0.1)';
        ctx.lineWidth = radius * 0.10;
        ctx.shadowColor = isOver ? 'rgba(255, 40, 40, 0.35)' : 'rgba(0, 180, 255, 0.3)';
        ctx.shadowBlur = 22;
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Body
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(nx, ny);
        ctx.strokeStyle = isOver ? '#ff7070' : '#b8f0ff';
        ctx.lineWidth = radius * 0.035;
        ctx.lineCap = 'round';
        ctx.shadowColor = isOver ? 'rgba(255, 70, 70, 0.8)' : 'rgba(80, 210, 255, 0.75)';
        ctx.shadowBlur = isOver ? 18 : 14;
        ctx.stroke();
        ctx.shadowBlur = 0;
    }

    // ══════════════════════════════════════════════════════════
    //  HUD DATA PANEL
    // ═════════════════════════════════════════════════════════
    function drawHUD(lw, lh, lcx, lcy, rcx, rcy, r, time) {
        const hudW = r * 1.9;
        const hudH = r * 0.4;
        const hudX = (lw / 2) - hudW / 2;
        const hudY = lcy + r * 1.2;

        // Panel background
        const cornerR = 8;
        ctx.beginPath();
        ctx.moveTo(hudX + cornerR, hudY);
        ctx.lineTo(hudX + hudW - cornerR, hudY);
        ctx.quadraticCurveTo(hudX + hudW, hudY, hudX + hudW, hudY + cornerR);
        ctx.lineTo(hudX + hudW, hudY + hudH - cornerR);
        ctx.quadraticCurveTo(hudX + hudW, hudY + hudH, hudX + hudW - cornerR, hudY + hudH);
        ctx.lineTo(hudX + cornerR, hudY + hudH);
        ctx.quadraticCurveTo(hudX, hudY + hudH, hudX, hudY + hudH - cornerR);
        ctx.lineTo(hudX, hudY + cornerR);
        ctx.quadraticCurveTo(hudX, hudY, hudX + cornerR, hudY);
        ctx.closePath();
        ctx.fillStyle = 'rgba(4, 12, 24, 0.75)';
        ctx.fill();
        ctx.strokeStyle = 'rgba(0, 180, 220, 0.35)';
        ctx.lineWidth = 1.2;
        ctx.shadowColor = 'rgba(0, 180, 220, 0.3)';
        ctx.shadowBlur = 8;
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Corner accents
        const accLen = 8;
        const corners = [
            [hudX, hudY, 1, 1], [hudX + hudW, hudY, -1, 1],
            [hudX, hudY + hudH, 1, -1], [hudX + hudW, hudY + hudH, -1, -1],
        ];
        for (const [cx, cy, dx, dy] of corners) {
            ctx.beginPath();
            ctx.moveTo(cx, cy + dy * accLen);
            ctx.lineTo(cx, cy);
            ctx.lineTo(cx + dx * accLen, cy);
            ctx.strokeStyle = 'rgba(0, 210, 255, 0.6)';
            ctx.lineWidth = 1.8;
            ctx.stroke();
        }

        // ── HUD data: dual-panel layout ──
        const midX = hudX + hudW * 0.5;
        const valueSize = Math.round(r * 0.17);
        const labelSize = Math.round(r * 0.09);
        const peakSize  = Math.round(r * 0.08);
        const rowY = hudY + hudH * 0.5;

        // Title-style shimmer for value text
        const t = time * 0.001;
        let lowFreq = 0;
        for (let i = 0; i < 8; i++) {
            lowFreq += (audioSpectrum[i] || 0) + (audioSpectrum[i + 64] || 0);
        }
        lowFreq /= 16;
        const punch = Math.min(lowFreq * 2.5, 1.0);
        const breath = 0.30 + 0.12 * Math.sin(t * 1.2) + punch * 0.35;

        const leftDbStr = leftLevel > DB_MIN + 0.01
            ? `${leftHudNeedle >= 0 ? '+' : ''}${leftHudNeedle.toFixed(1)}`
            : '---';
        const rightDbStr = rightLevel > DB_MIN + 0.01
            ? `${rightHudNeedle >= 0 ? '+' : ''}${rightHudNeedle.toFixed(1)}`
            : '---';
        const leftPeakStr = leftPeak > DB_MIN + 0.01
            ? `${leftHudPeak >= 0 ? '+' : ''}${leftHudPeak.toFixed(1)}`
            : '---';
        const rightPeakStr = rightPeak > DB_MIN + 0.01
            ? `${rightHudPeak >= 0 ? '+' : ''}${rightHudPeak.toFixed(1)}`
            : '---';

        // Vertical divider line (expanded for taller panel)
        ctx.beginPath();
        ctx.moveTo(midX, hudY + hudH * 0.10);
        ctx.lineTo(midX, hudY + hudH * 0.90);
        ctx.strokeStyle = 'rgba(0, 190, 230, 0.22)';
        ctx.lineWidth = 1;
        ctx.stroke();

        // Divider glow dot
        ctx.beginPath();
        ctx.arc(midX, rowY, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(0, 220, 255, 0.5)';
        ctx.shadowColor = 'rgba(0, 200, 255, 0.45)';
        ctx.shadowBlur = 8;
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.textBaseline = 'middle';

        // ── Left panel ──
        const lx = hudX + hudW * 0.25;
        // Label
        ctx.font = `600 ${labelSize}px 'Rajdhani', sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(80, 190, 240, 0.45)';
        ctx.fillText('LEFT', lx, hudY + hudH * 0.12);
        // Decorative underline (follows label)
        ctx.beginPath();
        ctx.moveTo(lx - valueSize * 0.55, hudY + hudH * 0.12 + valueSize * 0.25);
        ctx.lineTo(lx + valueSize * 0.55, hudY + hudH * 0.12 + valueSize * 0.25);
        ctx.strokeStyle = 'rgba(0, 180, 220, 0.18)';
        ctx.lineWidth = 1;
        ctx.stroke();
        // Value
        ctx.font = `bold ${valueSize}px 'Share Tech Mono', 'Consolas', monospace`;
        const leftAlpha = leftDbStr === '---'
            ? 0.3
            : 0.55 + breath * 0.35;
        ctx.fillStyle = `rgba(190, 245, 255, ${leftAlpha})`;
        ctx.shadowColor = leftDbStr === '---'
            ? 'rgba(0, 140, 200, 0.1)'
            : `rgba(0, 210, 255, ${0.2 + breath * 0.5})`;
        ctx.shadowBlur = 10;
        ctx.fillText(leftDbStr, lx, rowY + valueSize * 0.15);
        ctx.shadowBlur = 0;
        // Peak
        ctx.font = `500 ${peakSize}px 'Rajdhani', sans-serif`;
        ctx.fillStyle = leftPeakStr === '---'
            ? 'rgba(255, 110, 110, 0.15)'
            : 'rgba(255, 130, 130, 0.5)';
        ctx.fillText(`PEAK ${leftPeakStr}`, lx, hudY + hudH * 0.85);

        // ── Right panel ──
        const rx = hudX + hudW * 0.75;
        ctx.font = `600 ${labelSize}px 'Rajdhani', sans-serif`;
        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(80, 190, 240, 0.45)';
        ctx.fillText('RIGHT', rx, hudY + hudH * 0.12);
        ctx.beginPath();
        ctx.moveTo(rx - valueSize * 0.55, hudY + hudH * 0.12 + valueSize * 0.25);
        ctx.lineTo(rx + valueSize * 0.55, hudY + hudH * 0.12 + valueSize * 0.25);
        ctx.strokeStyle = 'rgba(0, 180, 220, 0.18)';
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.font = `bold ${valueSize}px 'Share Tech Mono', 'Consolas', monospace`;
        const rightAlpha = rightDbStr === '---'
            ? 0.3
            : 0.55 + breath * 0.35;
        ctx.fillStyle = `rgba(190, 245, 255, ${rightAlpha})`;
        ctx.shadowColor = rightDbStr === '---'
            ? 'rgba(0, 140, 200, 0.1)'
            : `rgba(0, 210, 255, ${0.2 + breath * 0.5})`;
        ctx.shadowBlur = 10;
        ctx.fillText(rightDbStr, rx, rowY + valueSize * 0.15);
        ctx.shadowBlur = 0;
        ctx.font = `500 ${peakSize}px 'Rajdhani', sans-serif`;
        ctx.fillStyle = rightPeakStr === '---'
            ? 'rgba(255, 110, 110, 0.15)'
            : 'rgba(255, 130, 130, 0.5)';
        ctx.fillText(`PEAK ${rightPeakStr}`, rx, hudY + hudH * 0.85);
    }

    // ═════════════════════════════════════════════════════════
    //  BOTTOM SPECTRUM PARTICLES
    // ═════════════════════════════════════════════════════════
    // Spectrum band count: computed once at init (resolution is fixed in Wallpaper Engine)
    const SPECTRUM_BAND_COUNT = Math.max(12, Math.floor(window.innerWidth / 40));
    const SPECTRUM_PARTICLES_PER_BAND = 1;
    let spectrumBands = [];

    function initSpectrum() {
        spectrumBands = [];
        for (let i = 0; i < SPECTRUM_BAND_COUNT * 2; i++) {
            spectrumBands.push({
                particles: [],
                targetH: 0,
                currentH: 0,
            });
        }
    }

    function getSpectrumValue(index, bandCount) {
        // Downsample 64 source values to bandCount bands per channel
        const step = 64 / bandCount;
        const start = Math.floor(index * step);
        const end = Math.min(Math.floor((index + 1) * step), 64);
        let sum = 0, count = 0;
        for (let j = start; j < end; j++) {
            sum += (audioSpectrum[j] || 0);
            count++;
        }
        return count > 0 ? sum / count : 0;
    }

    function spawnSpectrumParticles(lw, lh) {
        const spectrumH = lh * 0.22;
        const halfW = lw / 2;
        const bandW = halfW / SPECTRUM_BAND_COUNT;
        const bottomY = lh;

        for (let i = 0; i < SPECTRUM_BAND_COUNT * 2; i++) {
            const band = spectrumBands[i];
            let val;
            if (i < SPECTRUM_BAND_COUNT) {
                // Left channel: downsampled from 64 source values
                val = getSpectrumValue(i, SPECTRUM_BAND_COUNT);
            } else {
                // Right channel: downsampled from source values 64-127
                val = getSpectrumValue(i - SPECTRUM_BAND_COUNT, SPECTRUM_BAND_COUNT);
            }
            band.targetH = val * spectrumH;
            band.currentH += (band.targetH - band.currentH) * 0.18;

            const cx = i < SPECTRUM_BAND_COUNT
                ? i * bandW + bandW / 2
                : halfW + (SPECTRUM_BAND_COUNT - 1 - (i - SPECTRUM_BAND_COUNT)) * bandW + bandW / 2;

            if (band.currentH > 2 && band.particles.length < SPECTRUM_PARTICLES_PER_BAND) {
                band.particles.push({
                    x: cx,
                    y: bottomY - band.currentH,
                    vy: -(0.4 + Math.random() * 0.6),
                    r: 1.0 + Math.random() * 1.5,
                    life: 1.0,
                    decay: 0.010 + Math.random() * 0.015,
                    hue: 200 - (cx / (lw - 1)) * 40,
                });
            }

            for (let j = band.particles.length - 1; j >= 0; j--) {
                const p = band.particles[j];
                p.y += p.vy;
                p.vy *= 0.995;
                p.life -= p.decay;
                if (p.life <= 0 || p.y < bottomY - spectrumH - 30) {
                    band.particles.splice(j, 1);
                }
            }
        }
    }

    function drawSpectrum(lw, lh) {
        const spectrumH = lh * 0.22;
        const halfW = lw / 2;
        const bandW = halfW / SPECTRUM_BAND_COUNT;
        const bottomY = lh;

        for (let i = 0; i < SPECTRUM_BAND_COUNT * 2; i++) {
            const band = spectrumBands[i];
            const h = band.currentH;
            if (h < 0.5) continue;

            const x = i < SPECTRUM_BAND_COUNT
                ? i * bandW
                : halfW + (SPECTRUM_BAND_COUNT - 1 - (i - SPECTRUM_BAND_COUNT)) * bandW;

            const hue = 200 - (x / (lw - 1)) * 40;
            const alpha = 0.08 + 0.10 * (h / spectrumH);

            const grad = ctx.createLinearGradient(x, bottomY, x, bottomY - h);
            grad.addColorStop(0, `hsla(${hue}, 100%, 60%, ${alpha * 1.5})`);
            grad.addColorStop(0.6, `hsla(${hue}, 100%, 55%, ${alpha * 0.6})`);
            grad.addColorStop(1, `hsla(${hue}, 100%, 50%, 0)`);

            ctx.fillStyle = grad;
            ctx.fillRect(x, bottomY - h, bandW - 0.5, h);
        }

        for (let i = 0; i < SPECTRUM_BAND_COUNT * 2; i++) {
            const band = spectrumBands[i];
            for (const p of band.particles) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r * 3, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${p.hue}, 100%, 65%, ${p.life * 0.12})`;
                ctx.fill();

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `hsla(${p.hue}, 100%, 75%, ${p.life * 0.55})`;
                ctx.shadowColor = `hsla(${p.hue}, 100%, 60%, ${p.life * 0.5})`;
                ctx.shadowBlur = 8;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }
    }

    // ═════════════════════════════════════════════════════════
    //  TITLE  (neon glow + breathing animation)
    // ═════════════════════════════════════════════════════════
    function drawTitle(lw, lh) {
        const dim = Math.min(lw, lh);
        const t = globalTime * 0.001;

        // Low-frequency energy (approx 60-250 Hz) from first ~8 bands
        let lowFreq = 0;
        for (let i = 0; i < 8; i++) {
            lowFreq += (audioSpectrum[i] || 0) + (audioSpectrum[i + 64] || 0);
        }
        lowFreq /= 16;
        const punch = Math.min(lowFreq * 2.5, 1.0);

        // Breathing + low-freq punch modulation
        const breath = 0.30 + 0.12 * Math.sin(t * 1.2) + punch * 0.35;
        const hue = 195 + 15 * Math.sin(t * 0.4) + punch * 20;
        const rgb = `${hue}, 220, 255`;

        const fontSize = Math.round(dim * 0.055);
        ctx.save();
        ctx.font = `300 ${fontSize}px 'Orbitron', 'Segoe UI', sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        const tx = lw / 2;
        const ty = dim * 0.07;

        // Outer neon glow (wide)
        ctx.shadowColor = `rgba(${rgb}, ${0.25 + punch * 0.5})`;
        ctx.shadowBlur = 28 + punch * 30;
        ctx.fillStyle = `rgba(${rgb}, ${breath * 0.25})`;
        ctx.fillText('VU METER', tx, ty);

        // Mid glow
        ctx.shadowColor = `rgba(${rgb}, ${0.4 + punch * 0.5})`;
        ctx.shadowBlur = 14 + punch * 16;
        ctx.fillStyle = `rgba(${rgb}, ${breath * 0.55})`;
        ctx.fillText('VU METER', tx, ty);

        // Core text (bright)
        ctx.shadowColor = `rgba(${rgb}, ${0.6 + punch * 0.4})`;
        ctx.shadowBlur = 6 + punch * 12;
        ctx.fillStyle = `rgba(${rgb}, ${0.55 + breath * 0.35})`;
        ctx.fillText('VU METER', tx, ty);

        ctx.restore();
    }

    // ═══════════════════════════════════════════════════════════
    //  MAIN LOOP
    // ═══════════════════════════════════════════════════════════
    function frame() {
        globalTime = performance.now();
        const lw = window.innerWidth, lh = window.innerHeight;

        // Needle physics (low-pass filter → envelope follower)
        leftNeedle  = updateNeedle(leftNeedle, leftLevel, NEEDLE_ATTACK, NEEDLE_RELEASE);
        rightNeedle = updateNeedle(rightNeedle, rightLevel, NEEDLE_ATTACK, NEEDLE_RELEASE);

        // HUD display smoothing (same envelope follower logic)
        leftHudNeedle  = updateNeedle(leftHudNeedle, leftNeedle, NEEDLE_ATTACK, NEEDLE_RELEASE);
        rightHudNeedle = updateNeedle(rightHudNeedle, rightNeedle, NEEDLE_ATTACK, NEEDLE_RELEASE);
        leftHudPeak    = updateNeedle(leftHudPeak, leftPeak, PEAK_ATTACK, PEAK_RELEASE);
        rightHudPeak   = updateNeedle(rightHudPeak, rightPeak, PEAK_ATTACK, PEAK_RELEASE);

        // Peak decay
        const now = performance.now();
        if (now - leftPeakTime > PEAK_HOLD_TIME) {
            leftPeak += (DB_MIN - leftPeak) * PEAK_DECAY_SPEED;
            if (leftPeak < DB_MIN + 0.5) leftPeak = DB_MIN;
        }
        if (now - rightPeakTime > PEAK_HOLD_TIME) {
            rightPeak += (DB_MIN - rightPeak) * PEAK_DECAY_SPEED;
            if (rightPeak < DB_MIN + 0.5) rightPeak = DB_MIN;
        }

        // Needle trail recording
        trailFrame++;
        leftTrail.push(leftNeedle);
        rightTrail.push(rightNeedle);
        if (leftTrail.length > TRAIL_LENGTH) leftTrail.shift();
        if (rightTrail.length > TRAIL_LENGTH) rightTrail.shift();

        // Layout (horizontal only — wallpaper is always landscape)
        const cx = lw / 2, cy = lh / 2;
        let r = Math.min(lw, lh) * 0.20;
        r = Math.min(r, Math.min(lw / (2 * 1.35), lh / 1.45));
        const spacing = r * 1.50;
        const lcx = cx - spacing, lcy = cy;
        const rcx = cx + spacing, rcy = cy;

        // Clear
        ctx.save();
        ctx.setTransform(1, 0, 0, 1, 0, 0);
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.restore();

        // Draw layers (back to front)
        drawBackground(lw, lh, lcx, lcy, rcx, rcy, r);
        updateParticles(lw, lh);
        updateEnergyOrbs(lcx, lcy, rcx, rcy, r);
        drawBgDust();
        drawStreamers();
        drawEnergyOrbs();
        drawTitle(lw, lh);
        drawMeter(lcx, lcy, r, leftNeedle, leftPeak, 'L', leftTrail, globalTime);
        drawMeter(rcx, rcy, r, rightNeedle, rightPeak, 'R', rightTrail, globalTime);
        drawHUD(lw, lh, lcx, lcy, rcx, rcy, r, globalTime);
        spawnSpectrumParticles(lw, lh);
        drawSpectrum(lw, lh);

        requestAnimationFrame(frame);
    }

    // One-time init (resolution is fixed in Wallpaper Engine)
    initSpectrum();
    requestAnimationFrame(frame);
})();
</script>
</body>
